name: Build and Release

on:
  push:
    branches:
      - main

# Avoid two pushes racing to create the same tag / release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # Strip -SNAPSHOT suffix for the release tag
          RELEASE_VERSION="${VERSION%-SNAPSHOT}"
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          # Keep the full pom version (incl. -SNAPSHOT) for locating the built jar
          echo "full_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${TAG} already exists - skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Maven
        if: steps.tag_check.outputs.exists == 'false'
        run: mvn --batch-mode clean package -DskipTests=false

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Locate JAR artifact
        if: steps.tag_check.outputs.exists == 'false'
        id: find_jar
        run: |
          # Target the deterministic finalName built by sonar-packaging-maven-plugin,
          # avoiding original-*.jar / *-tests.jar sidecars. The jar carries the full
          # pom version (incl. -SNAPSHOT), not the stripped release version.
          JAR_PATH="target/sonar-mulesoft-plugin-${{ steps.get_version.outputs.full_version }}.jar"
          if [ ! -f "$JAR_PATH" ]; then
            echo "::error::Expected plugin jar not found at ${JAR_PATH}"
            ls -l target/*.jar || true
            exit 1
          fi
          echo "jar_path=${JAR_PATH}" >> "$GITHUB_OUTPUT"
          echo "jar_name=$(basename "${JAR_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Generate SHA-256 checksum
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cd target
          sha256sum "${{ steps.find_jar.outputs.jar_name }}" > "${{ steps.find_jar.outputs.jar_name }}.sha256"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## SonarQube MuleSoft Plugin ${{ steps.get_version.outputs.tag }}

            Static code analysis and quality rules for Mule 4 projects.

            ### Compatibility
            | Component | Version |
            | --------- | ------- |
            | Java runtime | 21+ |
            | SonarQube Plugin API | 13.4.3 (SonarQube 2025.x / 10.7+) |

            ### Installation
            1. Download `${{ steps.find_jar.outputs.jar_name }}` from the assets below.
            2. (Optional) Verify the download:
               ```bash
               sha256sum -c ${{ steps.find_jar.outputs.jar_name }}.sha256
               ```
            3. Copy the jar into your SonarQube `extensions/plugins/` directory.
            4. Restart SonarQube.

            ### Included rules
            - Flow Cognitive Complexity
            - Flow Cyclomatic Complexity
            - Flow Nesting Depth
            - DataWeave commented-out code detection

            ---
            See the auto-generated notes below for the full list of changes in this release.
          files: |
            ${{ steps.find_jar.outputs.jar_path }}
            ${{ steps.find_jar.outputs.jar_path }}.sha256
          draft: false
          prerelease: false
