name: Build and Release

on:
  push:
    branches:
      - build

jobs:
  release:
    name: Build, Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # Strip -SNAPSHOT suffix for the release tag
          RELEASE_VERSION="${VERSION%-SNAPSHOT}"
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Maven
        if: steps.tag_check.outputs.exists == 'false'
        run: mvn --batch-mode clean package -DskipTests=false

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Locate JAR artifact
        if: steps.tag_check.outputs.exists == 'false'
        id: find_jar
        run: |
          JAR_PATH=$(find target -maxdepth 1 -name "*.jar" ! -name "*-tests.jar" | head -1)
          echo "jar_path=${JAR_PATH}" >> "$GITHUB_OUTPUT"
          echo "jar_name=$(basename ${JAR_PATH})" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          body: |
            ## SonarQube Mulesoft Plugin ${{ steps.get_version.outputs.tag }}

            ### Installation
            Copy `${{ steps.find_jar.outputs.jar_name }}` into your SonarQube `extensions/plugins/` directory and restart SonarQube.
          files: ${{ steps.find_jar.outputs.jar_path }}
          draft: false
          prerelease: false
